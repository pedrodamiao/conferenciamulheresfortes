<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Lista de Inscritos por Oficina</title>

<style>
body{
  font-family:Arial;
  max-width:1000px;
  margin:auto;
  padding:1rem;
}

h1{color:#731240}

h2{
  background:#731240;
  color:white;
  padding:.5rem;
  border-radius:6px;
}

.card{
  background:#f8f3f4;
  padding:1rem;
  margin-bottom:1rem;
  border-left:5px solid #731240;
}
</style>
</head>

<body>

<h1>Lista de Inscritos por Oficina</h1>

{% for slot, oficinas in report.items() %}
  <h2>{{ slot }}</h2>

  {% for oficina, pessoas in oficinas.items() %}
    <div class="card">
      <strong>{{ oficina }}</strong> ({{ pessoas|length }})

      <ul>
        {% for p in pessoas %}
          <li>{{ p.name }} - {{ p.email }}</li>
        {% endfor %}
      </ul>
    </div>
  {% endfor %}

{% endfor %}

</body>
</html>
