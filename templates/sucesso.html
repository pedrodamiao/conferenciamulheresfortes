<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Inscrição realizada</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: #f2e9ea;
      color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 1rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      color: #731240;
      margin-bottom: 0.5rem;
    }

    .sub {
      color: #666;
      margin-bottom: 1.5rem;
    }

    .item {
      background: #f8f3f4;
      border-left: 5px solid #731240;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      text-align: left;
      border-radius: 6px;
    }

    .horario {
      font-weight: bold;
      color: #731240;
    }

    .btn {
      margin-top: 1.5rem;
      display: inline-block;
      background: #731240;
      color: white;
      padding: 0.7rem 1.5rem;
      border-radius: 6px;
      text-decoration: none;
    }

    .btn:hover {
      background: #5a0f33;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Inscrição realizada com sucesso</h1>

    <p class="sub">
      Seja bem vinda a Conferência Mulheres Fortes, <strong>{{ data.nome }}</strong>!<br>
      E-mail cadastrado: <strong>{{ data.email }}</strong>
    </p>

    <p class="sub">Oficinas escolhidas</p>

    {% for s in data.selecoes %}
      <div class="item">
        <div class="horario">{{ loop.index }}º horário</div>
        <div>{{ s.oficina }}</div>
      </div>
    {% endfor %}

    <a href="{{ url_for('index') }}" class="btn">Voltar</a>
  </div>
</body>
</html>
